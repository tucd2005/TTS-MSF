<div class="upload-modal" [class.show]="isOpen">
    <div class="modal-wrapper">
        <button class="close-btn" (click)="handleClose()">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="modal-container">
            <h2 class="title font-baloo">Tải lên</h2>

            <!-- Tabs -->
            <div class="tabs">
                <button [class.active]="activeTab === 'project'" (click)="activeTab = 'project'">
                    Dự án, bài tập
                </button>
                <button [class.active]="activeTab === 'notice'" (click)="activeTab = 'notice'">
                    Thông báo
                </button>
            </div>

            <p class="welcome">
                Xin chào bạn!<br />
                Hãy bắt đầu đăng dự án, thông báo đến mọi người nhé
            </p>

            <form class="upload-form" (ngSubmit)="handleSubmit()" >
                <ng-container *ngIf="activeTab === 'project'; 
                else noticeForm">
                    <input type="text" 
                    placeholder="Ten du an" 
                        [(ngModel)] = "projectTitle"
                        name="projectTitle"
                    />

                    <input type="text" placeholder="Ma nhung" [(ngModel)]="embedCode" name="embedCode"/>
                    <a href="#" class="get-code">Huogn dan lay ma nhung</a>

                    <input type="text" 
                        placeholder="Tags( vi du: hoc tap, react, nodejs)"
                        [(ngModel)]="tags"
                        name="tags"
                    />

          <!-- Upload thumbnail -->
          <div class="thumbnail-upload">
            <label for="imageUpload">Ảnh thumbnail dự án</label>
            <input type="file" id="imageUpload" (change)="handleImageUpload($event)" />
        
            <!-- Hiển thị preview -->
            <img *ngIf="previewImage" [src]="previewImage" alt="preview" />
          </div>

          <!-- Nội dung -->
          <div class="editor">
            <textarea
              [(ngModel)]="content"
              name="content"
              placeholder="Nhập nội dung mô tả dự án của bạn..."
              rows="6"
              class="textarea"
            ></textarea>
          </div>

          <!-- Submit -->
          <div class="btn-submit">
            <app-button type="submit">Đăng dự án</app-button>
          </div>
        </ng-container>

        <!-- Template cho tab Thông báo -->
        <ng-template #noticeForm>
          <div class="editor">
            <textarea
              [(ngModel)]="content"
              name="noticeContent"
              placeholder="Nhập nội dung thông báo..."
              rows="6"
              class="textarea"
            ></textarea>
          </div>
          <div class="btn-submit">
            <app-button type="submit">Đăng thông báo</app-button>
          </div>
        </ng-template>

        <p class="help-text">
          Bạn chưa biết đăng dự án?
          <a href="#">Xem hướng dẫn ở đây nhé</a>
        </p>
      </form>
    </div>
  </div>
</div>
